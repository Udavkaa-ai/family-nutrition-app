name: Build APK

on:
  workflow_dispatch:  # Запуск вручную кнопкой в GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: claude/add-voice-photo-recipes-YQYSE

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable

      - name: Create Flutter android project
        working-directory: frontend
        run: flutter create . --platforms android

      - name: Configure local.properties (Flutter SDK + Android SDK paths)
        working-directory: frontend/android
        run: |
          # Overwrite to guarantee correct paths — flutter create sometimes
          # writes a wrong sdk.dir when ANDROID_SDK_ROOT is not exported.
          echo "sdk.dir=${ANDROID_SDK_ROOT:-$ANDROID_HOME}" > local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> local.properties
          echo "=== local.properties ==="
          cat local.properties

      - name: Copy google-services.json
        run: cp frontend/google-services.json frontend/android/app/google-services.json

      - name: Set minSdkVersion, compileSdkVersion and applicationId
        working-directory: frontend/android/app
        run: |
          sed -i 's/minSdkVersion flutter\.minSdkVersion/minSdkVersion 23/' build.gradle
          sed -i 's/minSdk = flutter\.minSdkVersion/minSdk = 23/' build.gradle
          sed -i 's/minSdk = 21/minSdk = 23/' build.gradle
          sed -i 's/minSdkVersion 21/minSdkVersion 23/' build.gradle
          # Ensure compileSdkVersion is set explicitly (required by some plugins)
          sed -i 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 34/' build.gradle
          sed -i 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 34/' build.gradle
          sed -i 's/applicationId .*/applicationId "com.example.family_nutrition_app"/' build.gradle
          echo "=== build.gradle check ==="
          grep -E "minSdk|compileSdk|applicationId" build.gradle

      - name: Add Android permissions (mic + camera)
        run: |
          python3 -c "
          import re
          path = 'frontend/android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()
          permissions = '''    <uses-permission android:name=\"android.permission.RECORD_AUDIO\"/>
              <uses-permission android:name=\"android.permission.CAMERA\"/>
              <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" android:maxSdkVersion=\"32\"/>
              <uses-permission android:name=\"android.permission.READ_MEDIA_IMAGES\"/>
              <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\" android:maxSdkVersion=\"28\"/>
          '''
          content = content.replace('</manifest>', permissions + '</manifest>')
          with open(path, 'w') as f:
              f.write(content)
          print('Permissions added successfully')
          "

      - name: Get dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build APK
        working-directory: frontend
        run: |
          flutter build apk --release \
            --dart-define=BACKEND_API_URL=https://family-nutrition-app-production.up.railway.app \
            --dart-define=FIREBASE_PROJECT_ID=family-nutrition-app-4a4ae \
            --dart-define=FIREBASE_API_KEY=AIzaSyAaE5CufxkIjt0hsqh2Xu3706mnhYrKMyg \
            --dart-define=FIREBASE_AUTH_DOMAIN=family-nutrition-app-4a4ae.firebaseapp.com \
            --dart-define=FIREBASE_APP_ID=1:427590420240:android:779fe495b715d97f1f8795 \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=427590420240

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
