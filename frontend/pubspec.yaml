name: family_nutrition_app
description: Family Nutrition Advisor — AI-powered meal planning for the whole family.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.1.4

  # HTTP
  http: ^1.2.1

  # Voice input
  speech_to_text: ^6.6.0

  # Camera / image picking
  image_picker: ^1.1.2

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# App icon config (used by flutter_launcher_icons)
flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
